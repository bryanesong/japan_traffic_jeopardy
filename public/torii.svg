<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Torii gate">
  <title>Torii gate</title>
  <g fill="#E03A2F">
    <!-- top curved lintel (kasagi) -->
    <path d="M20 36 q80 -22 160 0 l0 16 q-80 -18 -160 0 Z"/>
    <!-- second lintel (nuki) -->
    <rect x="34" y="66" width="132" height="14"/>
    <!-- left pillar -->
    <path d="M52 54 L66 54 L62 176 L46 176 Z"/>
    <!-- right pillar -->
    <path d="M134 54 L148 54 L154 176 L138 176 Z"/>
    <!-- center plaque -->
    <rect x="92" y="50" width="16" height="20"/>
  </g>
  <!-- base stones -->
  <g fill="#0B1560">
    <rect x="40" y="176" width="30" height="8" rx="2"/>
    <rect x="130" y="176" width="30" height="8" rx="2"/>
  </g>
</svg>
