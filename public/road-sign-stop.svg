<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Japanese stop sign reading tomare">
  <title>Japanese stop sign (止まれ / tomare)</title>
  <!-- inverted triangle with white border, original artwork inspired by the Japanese 330-A sign -->
  <path d="M100 184 L8 28 a8 8 0 0 1 7 -12 L185 16 a8 8 0 0 1 7 12 Z" fill="#FFFFFF"/>
  <path d="M100 168 L26 44 a4 4 0 0 1 3.5 -6 L170.5 38 a4 4 0 0 1 3.5 6 Z" fill="#D7282F"/>
  <!-- 止まれ rendered as system text so it always shows the kanji+kana -->
  <text x="100" y="86" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700" font-size="40" fill="#FFFFFF">止</text>
  <text x="100" y="112" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700" font-size="22" fill="#FFFFFF">まれ</text>
  <text x="100" y="134" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="13" letter-spacing="1" fill="#FFFFFF">STOP</text>
</svg>
