<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Japan Traffic Jeopardy social share image">
  <title>Japan Traffic Jeopardy</title>
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0F5A"/>
      <stop offset="1" stop-color="#060CE9"/>
    </linearGradient>
    <linearGradient id="ogGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="0.5" stop-color="#E8B923"/>
      <stop offset="1" stop-color="#D4A017"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- rising-sun rays across the canvas -->
  <g stroke="#0A12C8" stroke-width="60" opacity="0.55" stroke-linecap="butt">
    <line x1="600" y1="315" x2="600" y2="-200"/>
    <line x1="600" y1="315" x2="1100" y2="-120"/>
    <line x1="600" y1="315" x2="1500" y2="120"/>
    <line x1="600" y1="315" x2="1500" y2="520"/>
    <line x1="600" y1="315" x2="100" y2="-120"/>
    <line x1="600" y1="315" x2="-300" y2="120"/>
    <line x1="600" y1="315" x2="-300" y2="520"/>
    <line x1="600" y1="315" x2="100" y2="750"/>
    <line x1="600" y1="315" x2="1100" y2="750"/>
  </g>

  <!-- gold frame -->
  <rect x="24" y="24" width="1152" height="582" rx="28" fill="none" stroke="#E8B923" stroke-width="6"/>

  <!-- emblem: rays + Fuji disc + torii -->
  <g transform="translate(230 300) scale(1.7)">
    <g stroke="#E8B923" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="0" x2="0" y2="-58"/>
      <line x1="0" y1="0" x2="40" y2="-42"/>
      <line x1="0" y1="0" x2="58" y2="0"/>
      <line x1="0" y1="0" x2="40" y2="42"/>
      <line x1="0" y1="0" x2="-40" y2="-42"/>
      <line x1="0" y1="0" x2="-58" y2="0"/>
      <line x1="0" y1="0" x2="-40" y2="42"/>
    </g>
    <circle cx="0" cy="0" r="46" fill="#060CE9"/>
    <path d="M-44 30 L-10 -22 q10 -14 20 0 L44 30 Z" fill="#1B2A78"/>
    <path d="M-10 -22 q10 -14 20 0 l-6 8 q-4 -4 -8 0 q-4 4 -8 0 Z" fill="#FFFFFF"/>
    <g fill="#E03A2F">
      <path d="M-30 -4 q30 -10 60 0 l0 6 q-30 -8 -60 0 Z"/>
      <rect x="-22" y="8" width="44" height="6"/>
      <rect x="-18" y="-2" width="6" height="34"/>
      <rect x="12" y="-2" width="6" height="34"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="470" y="270" font-family="'Anton','Archivo Black','Arial Black',sans-serif" font-size="108" letter-spacing="2" fill="url(#ogGold)" stroke="#0B1560" stroke-width="1">JAPAN</text>
  <text x="470" y="370" font-family="'Anton','Archivo Black','Arial Black',sans-serif" font-size="108" letter-spacing="2" fill="url(#ogGold)" stroke="#0B1560" stroke-width="1">TRAFFIC</text>
  <text x="470" y="468" font-family="'Anton','Archivo Black','Arial Black',sans-serif" font-size="92" letter-spacing="10" fill="#FFFFFF">JEOPARDY</text>

  <!-- motorcycle riding across the base -->
  <g transform="translate(470 500) scale(0.9)" fill="#E8B923">
    <circle cx="56" cy="118" r="30" fill="none" stroke="#E8B923" stroke-width="9"/>
    <circle cx="200" cy="118" r="30" fill="none" stroke="#E8B923" stroke-width="9"/>
    <path d="M56 118 L92 74 L150 74 L120 118 Z"/>
    <path d="M88 80 q20 -20 56 -18 l12 4 q6 8 -4 12 l-44 8 q-18 4 -20 -6 Z"/>
    <rect x="108" y="88" width="40" height="24" rx="4"/>
    <path d="M120 116 L196 120 q10 1 10 5 q0 5 -10 4 L120 124 Z"/>
    <path d="M150 74 L168 58 L196 62" fill="none" stroke="#E8B923" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
